name: Add issues to project

on:
  issues:
    types:
      - opened
      - transferred
  workflow_dispatch:
    inputs:
      issue_url:
        description: 'Issue URL to add to the project'
        required: true
        type: string

jobs:
  add-to-project:
    name: Add issue to Hyperion project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.ATLANTIS_SUPER_BOT_APP_ID }}
          private-key: ${{ secrets.ATLANTIS_SUPER_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-issues: read
          permission-organization-projects: write

      - name: Add issue to project
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EVENT_ISSUE_URL: ${{ github.event.issue.html_url }}
          DISPATCH_ISSUE_URL: ${{ inputs.issue_url }}
        run: |
          issue_url="${EVENT_ISSUE_URL:-$DISPATCH_ISSUE_URL}"
          gh project item-add 39 --owner atls --url "$issue_url"
